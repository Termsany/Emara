openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: EMARA API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: clients
  - name: projects
  - name: stages
  - name: quotations
  - name: files
  - name: approvals
  - name: comments
  - name: boq
  - name: payments
  - name: dashboard
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginBody" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthUser" }
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthUser" }

  /users:
    get:
      operationId: listUsers
      tags: [users]
      responses:
        "200":
          description: List users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
    post:
      operationId: createUser
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
    delete:
      operationId: deleteUser
      tags: [users]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      responses:
        "200":
          description: List clients
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Client" }
    post:
      operationId: createClient
      tags: [clients]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateClientBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Client" }
  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Client" }
    patch:
      operationId: updateClient
      tags: [clients]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateClientBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Client" }
    delete:
      operationId: deleteClient
      tags: [clients]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      responses:
        "200":
          description: List projects
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ProjectWithClient" }
    post:
      operationId: createProject
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProjectBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectDetail" }
    patch:
      operationId: updateProject
      tags: [projects]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProjectBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
    delete:
      operationId: deleteProject
      tags: [projects]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

  /projects/{projectId}/stages:
    get:
      operationId: listProjectStages
      tags: [stages]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Stages
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ProjectStage" }
  /stages/{id}:
    patch:
      operationId: updateStage
      tags: [stages]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateStageBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectStage" }

  /projects/{projectId}/quotation:
    get:
      operationId: getProjectQuotation
      tags: [quotations]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Quotation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuotationOrNull" }
    put:
      operationId: upsertProjectQuotation
      tags: [quotations]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpsertQuotationBody" }
      responses:
        "200":
          description: Quotation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quotation" }
  /quotations/{id}/status:
    patch:
      operationId: updateQuotationStatus
      tags: [quotations]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateQuotationStatusBody" }
      responses:
        "200":
          description: Quotation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quotation" }

  /projects/{projectId}/files:
    get:
      operationId: listProjectFiles
      tags: [files]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Files
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FileAsset" }
    post:
      operationId: createProjectFile
      tags: [files]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateFileBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FileAsset" }
  /files:
    get:
      operationId: listAllFiles
      tags: [files]
      responses:
        "200":
          description: All files
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FileAsset" }
  /files/{id}:
    delete:
      operationId: deleteFile
      tags: [files]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

  /projects/{projectId}/approvals:
    get:
      operationId: listProjectApprovals
      tags: [approvals]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Approvals
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ApprovalDetail" }
    post:
      operationId: requestApproval
      tags: [approvals]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RequestApprovalBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApprovalDetail" }
  /approvals:
    get:
      operationId: listApprovals
      tags: [approvals]
      responses:
        "200":
          description: All approvals
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ApprovalDetail" }
  /approvals/{id}/respond:
    post:
      operationId: respondToApproval
      tags: [approvals]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RespondApprovalBody" }
      responses:
        "200":
          description: Responded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApprovalDetail" }

  /projects/{projectId}/comments:
    get:
      operationId: listProjectComments
      tags: [comments]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CommentWithUser" }
    post:
      operationId: createProjectComment
      tags: [comments]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCommentBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommentWithUser" }

  /projects/{projectId}/boq:
    get:
      operationId: listProjectBoq
      tags: [boq]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: BOQ items
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BoqItem" }
    post:
      operationId: createBoqItem
      tags: [boq]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateBoqItemBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BoqItem" }
  /boq:
    get:
      operationId: listAllBoq
      tags: [boq]
      responses:
        "200":
          description: All BOQ items with project info
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BoqItemWithProject" }
  /boq-items/{id}:
    patch:
      operationId: updateBoqItem
      tags: [boq]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateBoqItemBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BoqItem" }
    delete:
      operationId: deleteBoqItem
      tags: [boq]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

  /projects/{projectId}/payments:
    get:
      operationId: listProjectPayments
      tags: [payments]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Payment" }
    post:
      operationId: createPayment
      tags: [payments]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePaymentBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Payment" }
  /payments:
    get:
      operationId: listAllPayments
      tags: [payments]
      responses:
        "200":
          description: All payments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PaymentWithProject" }
  /payments/{id}:
    patch:
      operationId: updatePayment
      tags: [payments]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePaymentBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Payment" }
    delete:
      operationId: deletePayment
      tags: [payments]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardStats" }
  /dashboard/recent-projects:
    get:
      operationId: getRecentProjects
      tags: [dashboard]
      responses:
        "200":
          description: Recent
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ProjectWithClient" }
  /dashboard/pending-approvals:
    get:
      operationId: getPendingApprovals
      tags: [dashboard]
      responses:
        "200":
          description: Pending
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ApprovalDetail" }
  /dashboard/upcoming-payments:
    get:
      operationId: getUpcomingPayments
      tags: [dashboard]
      responses:
        "200":
          description: Upcoming
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PaymentWithProject" }
  /dashboard/overdue-stages:
    get:
      operationId: getOverdueStages
      tags: [dashboard]
      responses:
        "200":
          description: Overdue stages
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StageWithProject" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    Ok:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    Role:
      type: string
      enum: [admin, sales, designer, draftsman, qs, accountant, client]

    AuthUser:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        clientId: { type: ["integer", "null"] }
      required: [id, name, email, role, clientId]

    LoginBody:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]

    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        clientId: { type: ["integer", "null"] }
        createdAt: { type: string, format: date-time }
      required: [id, name, email, role, clientId, createdAt]

    CreateUserBody:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        clientId: { type: ["integer", "null"] }
      required: [name, email, password, role]

    UpdateUserBody:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        clientId: { type: ["integer", "null"] }

    Client:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        source: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required: [id, name, phone, email, address, source, notes, createdAt]

    CreateClientBody:
      type: object
      properties:
        name: { type: string }
        phone: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        source: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
      required: [name]

    UpdateClientBody:
      type: object
      properties:
        name: { type: string }
        phone: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        source: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }

    ProjectStatus:
      type: string
      enum:
        - new_lead
        - quotation_sent
        - contract_signed
        - site_survey
        - planning_2d
        - mood_board
        - design_3d
        - client_review
        - shop_drawings
        - boq
        - execution_ready
        - completed
        - cancelled

    ProjectType:
      type: string
      enum: [apartment, villa, office, restaurant, clinic, retail_store, other]

    DesignStyle:
      type: string
      enum: [modern, classic, neoclassical, minimal, japandi, industrial, contemporary, luxury]

    ScopeType:
      type: string
      enum: [design_only, design_shop_drawings, design_supervision, design_execution, turnkey]

    Project:
      type: object
      properties:
        id: { type: integer }
        clientId: { type: integer }
        projectName: { type: string }
        projectType: { $ref: "#/components/schemas/ProjectType" }
        location: { type: ["string", "null"] }
        areaSqm: { type: number }
        designStyle: { $ref: "#/components/schemas/DesignStyle" }
        scopeType: { $ref: "#/components/schemas/ScopeType" }
        budget: { type: ["number", "null"] }
        status: { $ref: "#/components/schemas/ProjectStatus" }
        startDate: { type: ["string", "null"], format: date }
        expectedEndDate: { type: ["string", "null"], format: date }
        notes: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - clientId
        - projectName
        - projectType
        - location
        - areaSqm
        - designStyle
        - scopeType
        - budget
        - status
        - startDate
        - expectedEndDate
        - notes
        - createdAt

    ProjectWithClient:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            clientName: { type: string }
            progressPercent: { type: integer }
          required: [clientName, progressPercent]

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            clientName: { type: string }
            progressPercent: { type: integer }
            stagesTotal: { type: integer }
            stagesCompleted: { type: integer }
          required: [clientName, progressPercent, stagesTotal, stagesCompleted]

    CreateProjectBody:
      type: object
      properties:
        clientId: { type: integer }
        projectName: { type: string }
        projectType: { $ref: "#/components/schemas/ProjectType" }
        location: { type: ["string", "null"] }
        areaSqm: { type: number }
        designStyle: { $ref: "#/components/schemas/DesignStyle" }
        scopeType: { $ref: "#/components/schemas/ScopeType" }
        budget: { type: ["number", "null"] }
        status: { $ref: "#/components/schemas/ProjectStatus" }
        startDate: { type: ["string", "null"], format: date }
        expectedEndDate: { type: ["string", "null"], format: date }
        notes: { type: ["string", "null"] }
      required: [clientId, projectName, projectType, areaSqm, designStyle, scopeType, status]

    UpdateProjectBody:
      type: object
      properties:
        clientId: { type: integer }
        projectName: { type: string }
        projectType: { $ref: "#/components/schemas/ProjectType" }
        location: { type: ["string", "null"] }
        areaSqm: { type: number }
        designStyle: { $ref: "#/components/schemas/DesignStyle" }
        scopeType: { $ref: "#/components/schemas/ScopeType" }
        budget: { type: ["number", "null"] }
        status: { $ref: "#/components/schemas/ProjectStatus" }
        startDate: { type: ["string", "null"], format: date }
        expectedEndDate: { type: ["string", "null"], format: date }
        notes: { type: ["string", "null"] }

    StageStatus:
      type: string
      enum:
        - locked
        - not_started
        - in_progress
        - waiting_client_approval
        - revision_required
        - approved
        - completed

    ProjectStage:
      type: object
      properties:
        id: { type: integer }
        projectId: { type: integer }
        stageName: { type: string }
        stageKey: { type: string }
        order: { type: integer }
        status: { $ref: "#/components/schemas/StageStatus" }
        assignedToId: { type: ["integer", "null"] }
        assignedToName: { type: ["string", "null"] }
        startDate: { type: ["string", "null"], format: date }
        dueDate: { type: ["string", "null"], format: date }
        completedAt: { type: ["string", "null"], format: date-time }
        requiresClientApproval: { type: boolean }
        notes: { type: ["string", "null"] }
      required:
        - id
        - projectId
        - stageName
